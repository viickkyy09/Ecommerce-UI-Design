<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .log-in{
            border: 2px solid black;
            display: flex;
            height: 200px;
            width: 40%;
            align-items: center;
            flex-direction: column;
            justify-content: space-evenly;
        }
        input{
            height: 30px;
            width: 300px;
        }
        .submit-btn{
            border-radius: 25px;
            height: 20px;
            width: 80px;
            background-color: yellow;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
</head>
<body>
    <center>
    <div class="log-in">
        Email:-<a><input type="email" placeholder="example@gmail.com"></a>
        Password:-<a><input type="password" placeholder="password"></a>
        <input class="submit-btn" type="submit">
    </div>
    </center>
    
</body>
</html>
